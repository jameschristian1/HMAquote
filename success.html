<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quote Request Sent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #004a99;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #004a99;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #003a7a;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Request Received</h1>

        <p>
            Thanks — your quote request has been submitted successfully.<br>
            Our aviation team will get back to you shortly.
        </p>

        <p id="quoteRef" style="margin-top:15px; font-size:1.1rem;"></p>

        <a class="btn" href="index.html">Submit another request</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("quoteId");

        if (id) {
            document.getElementById("quoteRef").innerText =
                "Your reference: " + id;
        }
    </script>
</body>
</html>
